name: Release Check

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: release-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Build Linux distributions
    uses: ./.github/workflows/build-wheel.yml
    with:
      os: ubuntu-latest
      python: "3.11"
      target: x86_64
      manylinux: "2_28"
      artifact: check-linux-x86_64-abi3
      sdist: true

  build-macos:
    name: Build macOS distribution
    uses: ./.github/workflows/build-wheel.yml
    with:
      os: macos-14
      python: "3.11"
      target: aarch64
      artifact: check-macos-aarch64-abi3

  build-windows:
    name: Build Windows distribution
    uses: ./.github/workflows/build-wheel.yml
    with:
      os: windows-latest
      python: "3.11"
      target: x64
      artifact: check-windows-x86_64-abi3

  quality:
    name: Quality and owned contracts
    runs-on: ubuntu-latest
    env:
      BUILD_PYTHON: "3.14"
      RUST_TOOLCHAIN: 1.97.0
      UV_PYTHON: "3.14"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.14"
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: clippy, rustfmt
      - name: Install quality dependencies
        run: uv sync --locked --no-install-project --extra cdp --python 3.14
      - name: Check release metadata, Python, and Rust
        run: make prerelease-version-check lint typecheck rust-check rust-test
      - name: Test packaging contracts
        run: make test-package

  sdk:
    name: SDK on Python ${{ matrix.python }}
    needs: build-linux
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ matrix.python }}
      - name: Install test dependencies
        run: uv sync --locked --no-install-project --python ${{ matrix.python }}
      - name: Download Linux wheel
        uses: actions/download-artifact@v8
        with:
          name: check-linux-x86_64-abi3
          path: dist
      - name: Install Linux wheel
        run: |
          wheel=$(find dist -name '*.whl' -print -quit)
          uv pip install --python .venv/bin/python "$wheel"
      - name: Test SDK contracts
        run: uv run --no-sync --python ${{ matrix.python }} pytest -q -m sdk_dx

  native:
    name: Native and browser seams on ${{ matrix.os }}
    needs: [build-linux, build-macos, build-windows]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: check-linux-x86_64-abi3
          - os: macos-14
            artifact: check-macos-aarch64-abi3
          - os: windows-latest
            artifact: check-windows-x86_64-abi3
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.14"
      - name: Install test dependencies
        run: uv sync --locked --no-install-project --python 3.14
      - name: Download native wheel
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: dist
      - name: Install native wheel
        run: |
          wheel=$(find dist -name '*.whl' -print -quit)
          uv pip install --python .venv "$wheel" "websockets>=15.0"
      - name: Install Linux WebGPU dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libvulkan1 mesa-vulkan-drivers
      - name: Test native boundary
        run: |
          marker=native_smoke
          if [ "$RUNNER_OS" = Windows ]; then
            marker="native_smoke or sdk_dx"
          fi
          uv run --no-sync --python 3.14 pytest -q -m "$marker"
      - name: Test real-browser seams
        run: |
          chrome_path=$(uv run --no-sync --python 3.14 python scripts/check_chrome.py)
          chrome_path=${chrome_path%$'\r'}
          PYAGENTBROWSER_CHROME="$chrome_path" \
          PYAGENTBROWSER_FAIL_ON_SKIP=1 \
          uv run --no-sync --python 3.14 pytest -q -m integration

  gate:
    name: Required gate
    if: always()
    needs: [build-linux, build-macos, build-windows, quality, sdk, native]
    runs-on: ubuntu-latest
    steps:
      - name: Require every release check
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: jq --exit-status 'all(.[]; .result == "success")' <<<"$RESULTS"
