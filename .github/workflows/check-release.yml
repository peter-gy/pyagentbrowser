name: Release Check

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  python-matrix:
    name: Python ${{ matrix.python }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v8.1.0
      - uses: dtolnay/rust-toolchain@stable
      - run: uv sync --python ${{ matrix.python }}
      - run: uv run --python ${{ matrix.python }} maturin develop
      - run: uv run --python ${{ matrix.python }} pytest -q

  package:
    name: Package on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      PYTHON_VERSIONS: "3.11 3.12 3.13 3.14"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v8.1.0
      - uses: dtolnay/rust-toolchain@stable
      - run: make prerelease-version-check
      - run: make package
