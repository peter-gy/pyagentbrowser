name: Publish pyagentbrowser to PyPI

on:
  workflow_dispatch:
  push:
    tags:
      - v*

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    uses: ./.github/workflows/build-wheel.yml
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.10"
            target: x86_64
            artifact: linux-x86_64-cp310
            sdist: true
          - os: ubuntu-latest
            python: "3.11"
            target: x86_64
            artifact: linux-x86_64-cp311
          - os: ubuntu-latest
            python: "3.12"
            target: x86_64
            artifact: linux-x86_64-cp312
          - os: ubuntu-latest
            python: "3.13"
            target: x86_64
            artifact: linux-x86_64-cp313
          - os: ubuntu-latest
            python: "3.14"
            target: x86_64
            artifact: linux-x86_64-cp314
          - os: ubuntu-latest
            python: "3.10"
            target: aarch64-unknown-linux-gnu
            artifact: linux-aarch64-cp310
          - os: ubuntu-latest
            python: "3.11"
            target: aarch64-unknown-linux-gnu
            artifact: linux-aarch64-cp311
          - os: ubuntu-latest
            python: "3.12"
            target: aarch64-unknown-linux-gnu
            artifact: linux-aarch64-cp312
          - os: ubuntu-latest
            python: "3.13"
            target: aarch64-unknown-linux-gnu
            artifact: linux-aarch64-cp313
          - os: ubuntu-latest
            python: "3.14"
            target: aarch64-unknown-linux-gnu
            artifact: linux-aarch64-cp314
          - os: macos-13
            python: "3.10"
            target: x86_64
            artifact: macos-x86_64-cp310
          - os: macos-13
            python: "3.11"
            target: x86_64
            artifact: macos-x86_64-cp311
          - os: macos-13
            python: "3.12"
            target: x86_64
            artifact: macos-x86_64-cp312
          - os: macos-13
            python: "3.13"
            target: x86_64
            artifact: macos-x86_64-cp313
          - os: macos-13
            python: "3.14"
            target: x86_64
            artifact: macos-x86_64-cp314
          - os: macos-14
            python: "3.10"
            target: aarch64
            artifact: macos-aarch64-cp310
          - os: macos-14
            python: "3.11"
            target: aarch64
            artifact: macos-aarch64-cp311
          - os: macos-14
            python: "3.12"
            target: aarch64
            artifact: macos-aarch64-cp312
          - os: macos-14
            python: "3.13"
            target: aarch64
            artifact: macos-aarch64-cp313
          - os: macos-14
            python: "3.14"
            target: aarch64
            artifact: macos-aarch64-cp314
    with:
      os: ${{ matrix.os }}
      python: ${{ matrix.python }}
      target: ${{ matrix.target }}
      artifact: wheels-${{ matrix.artifact }}
      sdist: ${{ matrix.sdist || false }}

  publish:
    name: Publish distributions
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          password: ${{ secrets.PYPI_API_TOKEN }}
