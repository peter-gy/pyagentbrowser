name: Publish

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"
      - "[0-9]*.[0-9]*.[0-9]*rc[0-9]*"
      - "v[0-9]*.[0-9]*.[0-9]*"
      - "v[0-9]*.[0-9]*.[0-9]*rc[0-9]*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  check-release-tag:
    name: Check release tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Check package version
        run: ./scripts/release.sh check-version "${{ github.ref_name }}"

      - name: Check upstream release metadata
        run: python scripts/prepare_prerelease.py --check

  build:
    name: Build ${{ matrix.artifact }}
    needs: check-release-tag
    uses: ./.github/workflows/build-wheel.yml
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.11"
            target: x86_64
            manylinux: "2_28"
            artifact: linux-x86_64-abi3
            sdist: true
          - os: ubuntu-latest
            python: "3.11"
            target: aarch64-unknown-linux-gnu
            manylinux: "2_28"
            artifact: linux-aarch64-abi3
          - os: macos-15-intel
            python: "3.11"
            target: x86_64
            artifact: macos-x86_64-abi3
          - os: macos-14
            python: "3.11"
            target: aarch64
            artifact: macos-aarch64-abi3
    with:
      os: ${{ matrix.os }}
      python: ${{ matrix.python }}
      target: ${{ matrix.target }}
      manylinux: ${{ matrix.manylinux || '2_28' }}
      artifact: wheels-${{ matrix.artifact }}
      sdist: ${{ matrix.sdist || false }}

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.14"
          enable-cache: false
          cache-dependency-glob: uv.lock

      - name: Check PyPI state
        id: pypi
        env:
          PACKAGE: pyagentbrowser
          VERSION: ${{ github.ref_name }}
        run: |
          version="${VERSION#v}"
          status=$(curl -s -o /dev/null -I -w "%{http_code}" "https://pypi.org/pypi/${PACKAGE}/${version}/json")
          if [ "$status" = "200" ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE} ${version} is already on PyPI"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download distributions
        if: steps.pypi.outputs.already_published != 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish distributions
        if: steps.pypi.outputs.already_published != 'true'
        run: |
          for wheel in dist/*.whl
          do
            unzip -qt "$wheel"
          done
          uvx twine check --strict dist/*
          uv publish --trusted-publishing always dist/*

  release-notes:
    name: Update release notes
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Update release notes
        run: npx --yes changelogithub@14.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
