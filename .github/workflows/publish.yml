name: Publish

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"
      - "[0-9]*.[0-9]*.[0-9]*rc[0-9]*"
      - "v[0-9]*.[0-9]*.[0-9]*"
      - "v[0-9]*.[0-9]*.[0-9]*rc[0-9]*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  check-release-tag:
    name: Check release tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Check package version
        run: ./scripts/release.sh check-version "${{ github.ref_name }}"

      - name: Check upstream release metadata
        run: python scripts/prepare_prerelease.py --check

  build:
    name: Build ${{ matrix.artifact }}
    needs: check-release-tag
    uses: ./.github/workflows/build-wheel.yml
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.10"
            target: x86_64
            artifact: linux-x86_64-cp310
            sdist: true
          - os: ubuntu-latest
            python: "3.11"
            target: x86_64
            artifact: linux-x86_64-cp311
          - os: ubuntu-latest
            python: "3.12"
            target: x86_64
            artifact: linux-x86_64-cp312
          - os: ubuntu-latest
            python: "3.13"
            target: x86_64
            artifact: linux-x86_64-cp313
          - os: ubuntu-latest
            python: "3.14"
            target: x86_64
            artifact: linux-x86_64-cp314
          - os: ubuntu-latest
            python: "3.10"
            target: aarch64-unknown-linux-gnu
            artifact: linux-aarch64-cp310
          - os: ubuntu-latest
            python: "3.11"
            target: aarch64-unknown-linux-gnu
            artifact: linux-aarch64-cp311
          - os: ubuntu-latest
            python: "3.12"
            target: aarch64-unknown-linux-gnu
            artifact: linux-aarch64-cp312
          - os: ubuntu-latest
            python: "3.13"
            target: aarch64-unknown-linux-gnu
            artifact: linux-aarch64-cp313
          - os: ubuntu-latest
            python: "3.14"
            target: aarch64-unknown-linux-gnu
            artifact: linux-aarch64-cp314
          - os: macos-13
            python: "3.10"
            target: x86_64
            artifact: macos-x86_64-cp310
          - os: macos-13
            python: "3.11"
            target: x86_64
            artifact: macos-x86_64-cp311
          - os: macos-13
            python: "3.12"
            target: x86_64
            artifact: macos-x86_64-cp312
          - os: macos-13
            python: "3.13"
            target: x86_64
            artifact: macos-x86_64-cp313
          - os: macos-13
            python: "3.14"
            target: x86_64
            artifact: macos-x86_64-cp314
          - os: macos-14
            python: "3.10"
            target: aarch64
            artifact: macos-aarch64-cp310
          - os: macos-14
            python: "3.11"
            target: aarch64
            artifact: macos-aarch64-cp311
          - os: macos-14
            python: "3.12"
            target: aarch64
            artifact: macos-aarch64-cp312
          - os: macos-14
            python: "3.13"
            target: aarch64
            artifact: macos-aarch64-cp313
          - os: macos-14
            python: "3.14"
            target: aarch64
            artifact: macos-aarch64-cp314
    with:
      os: ${{ matrix.os }}
      python: ${{ matrix.python }}
      target: ${{ matrix.target }}
      artifact: wheels-${{ matrix.artifact }}
      sdist: ${{ matrix.sdist || false }}

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  release-notes:
    name: Update release notes
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Update release notes
        run: npx --yes changelogithub@14.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
