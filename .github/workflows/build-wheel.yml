name: Build pyagentbrowser wheel

on:
  workflow_call:
    inputs:
      os:
        description: GitHub runner label.
        required: true
        type: string
      python:
        description: Python version to build for.
        required: true
        type: string
      target:
        description: Maturin target.
        required: true
        type: string
      manylinux:
        description: Linux platform compatibility tag.
        required: false
        default: "2_28"
        type: string
      artifact:
        description: Uploaded artifact name.
        required: true
        type: string
      sdist:
        description: Build the source distribution with this wheel.
        required: false
        default: false
        type: boolean
      sccache:
        description: Cache Rust compilation for this wheel.
        required: false
        default: true
        type: boolean

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build:
    name: ${{ inputs.artifact }}
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python }}
      - uses: astral-sh/setup-uv@v8.2.0
      - uses: dtolnay/rust-toolchain@1.97.0

      - name: Set reproducible build inputs
        run: |
          SOURCE_DATE_EPOCH=$(git log -1 --format=%ct) python - <<'PY'
          import os
          from pathlib import Path

          workspace = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
          cargo_home = Path(os.environ.get("CARGO_HOME", Path.home() / ".cargo")).resolve()
          rustflags = " ".join(
              (
                  f"--remap-path-prefix={workspace}=/src/pyagentbrowser",
                  "--remap-path-prefix=/io=/src/pyagentbrowser",
                  f"--remap-path-prefix={cargo_home}=/cargo",
                  "--remap-path-prefix=/root/.cargo=/cargo",
                  "--remap-path-prefix=/usr/local/cargo=/cargo",
              )
          )
          with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as env_file:
              print(f"SOURCE_DATE_EPOCH={os.environ['SOURCE_DATE_EPOCH']}", file=env_file)
              print(f"RUSTFLAGS={rustflags}", file=env_file)
          PY

      - name: Build source distribution
        if: inputs.sdist
        run: uvx --from "maturin==1.14.1" maturin sdist --out dist

      - name: Build Linux wheel
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@v1
        env:
          CARGO_HTTP_MULTIPLEXING: "false"
          CARGO_NET_RETRY: "10"
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
          CFLAGS_aarch64_unknown_linux_gnu: "-D__ARM_ARCH=8"
        with:
          maturin-version: v1.14.1
          rust-toolchain: 1.97.0
          target: ${{ inputs.target }}
          manylinux: ${{ inputs.manylinux }}
          sccache: ${{ inputs.sccache }}
          docker-options: >-
            -e CARGO_HTTP_MULTIPLEXING
            -e CARGO_NET_RETRY
            -e CARGO_REGISTRIES_CRATES_IO_PROTOCOL
            -e CFLAGS_aarch64_unknown_linux_gnu
            -e RUSTFLAGS
            -e SOURCE_DATE_EPOCH
          args: >-
            --release
            --locked
            --compatibility pypi
            --out dist
            --interpreter python${{ inputs.python }}

      - name: Build native wheel
        if: runner.os != 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: v1.14.1
          rust-toolchain: 1.97.0
          target: ${{ inputs.target }}
          sccache: ${{ inputs.sccache }}
          args: >-
            --release
            --locked
            --compatibility pypi
            --out dist
            --interpreter python

      - name: Check built distributions
        env:
          EXPECT_SDIST: ${{ inputs.sdist }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          from scripts.package_smoke import check_sdist, check_wheel

          wheels = sorted(Path("dist").glob("*.whl"))
          assert len(wheels) == 1, wheels
          check_wheel(wheels[0])

          sdists = sorted(Path("dist").glob("*.tar.gz"))
          expected_sdists = 1 if os.environ["EXPECT_SDIST"] == "true" else 0
          assert len(sdists) == expected_sdists, sdists
          if sdists:
              check_sdist(sdists[0])
          PY

      - name: Test built distributions
        if: >-
          (runner.os == 'Linux' && runner.arch == 'X64' && inputs.target == 'x86_64') ||
          (runner.os == 'Linux' && runner.arch == 'ARM64' && startsWith(inputs.target, 'aarch64')) ||
          (runner.os == 'macOS' && runner.arch == 'X64' && inputs.target == 'x86_64') ||
          (runner.os == 'macOS' && runner.arch == 'ARM64' && inputs.target == 'aarch64') ||
          (runner.os == 'Windows' && runner.arch == 'X64' && inputs.target == 'x64')
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/pyagentbrowser-artifact-target
          PYAGENTBROWSER_PYTHON_VERSIONS: "3.11 3.14"
        run: env -u RUSTC_WRAPPER python scripts/verify-install-artifacts.py dist

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact }}
          path: dist/*
          if-no-files-found: error
