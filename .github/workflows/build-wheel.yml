name: Build pyagentbrowser wheel

on:
  workflow_call:
    inputs:
      os:
        description: GitHub runner label.
        required: true
        type: string
      python:
        description: Python version to build for.
        required: true
        type: string
      target:
        description: Maturin target.
        required: true
        type: string
      manylinux:
        description: Linux platform compatibility tag.
        required: false
        default: "2_28"
        type: string
      artifact:
        description: Uploaded artifact name.
        required: true
        type: string
      sdist:
        description: Build the source distribution with this wheel.
        required: false
        default: false
        type: boolean

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build:
    name: ${{ inputs.artifact }}
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python }}
      - uses: dtolnay/rust-toolchain@stable

      - name: Set reproducible build inputs
        run: |
          echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"
          echo "RUSTFLAGS=--remap-path-prefix=${GITHUB_WORKSPACE}=/src/pyagentbrowser --remap-path-prefix=/io=/src/pyagentbrowser --remap-path-prefix=${HOME}/.cargo=/cargo --remap-path-prefix=/root/.cargo=/cargo --remap-path-prefix=/usr/local/cargo=/cargo" >> "$GITHUB_ENV"

      - name: Build Linux wheel
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@v1
        env:
          CARGO_HTTP_MULTIPLEXING: "false"
          CARGO_NET_RETRY: "10"
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
          CFLAGS_aarch64_unknown_linux_gnu: "-D__ARM_ARCH=8"
        with:
          maturin-version: v1.14.1
          target: ${{ inputs.target }}
          manylinux: ${{ inputs.manylinux }}
          docker-options: >-
            -e CARGO_HTTP_MULTIPLEXING
            -e CARGO_NET_RETRY
            -e CARGO_REGISTRIES_CRATES_IO_PROTOCOL
            -e CFLAGS_aarch64_unknown_linux_gnu
            -e RUSTFLAGS
            -e SOURCE_DATE_EPOCH
          args: >-
            --release
            --locked
            --compatibility pypi
            --out dist
            --interpreter python${{ inputs.python }}

      - name: Build native wheel
        if: runner.os != 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: v1.14.1
          target: ${{ inputs.target }}
          args: >-
            --release
            --locked
            --compatibility pypi
            --out dist
            --interpreter python

      - name: Build source distribution
        if: inputs.sdist
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: v1.14.1
          command: sdist
          docker-options: >-
            -e RUSTFLAGS
            -e SOURCE_DATE_EPOCH
          args: --out dist

      - name: Check built wheel payload
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import zipfile

          wheels = sorted(Path("dist").glob("*.whl"))
          assert len(wheels) == 1, wheels
          with zipfile.ZipFile(wheels[0]) as wheel:
              names = set(wheel.namelist())
              native_names = sorted(
                  name for name in names if name.startswith("agentbrowser/_native")
              )
              assert len(native_names) == 1, native_names
              native_name = native_names[0]
              native = wheel.read(native_name)
          assert any(name.endswith(".dist-info/METADATA") for name in names)
          assert any(name.startswith("agentbrowser/") for name in names)
          forbidden_paths = (
              os.environ["GITHUB_WORKSPACE"].encode(),
              str(Path.home() / ".cargo").encode(),
              b"/io/",
              b"/root/.cargo/",
              b"/usr/local/cargo/",
          )
          assert all(path not in native for path in forbidden_paths)
          PY

      - name: Test built wheel
        if: >-
          (runner.os == 'Linux' && inputs.target == 'x86_64') ||
          (runner.os == 'macOS' && runner.arch == 'X64' && inputs.target == 'x86_64') ||
          (runner.os == 'macOS' && runner.arch == 'ARM64' && inputs.target == 'aarch64')
        run: |
          python -m venv wheel-test
          source wheel-test/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python - <<'PY'
          from agentbrowser import Browser
          import agentbrowser._native as native

          assert Browser
          assert native.__agent_browser_version__
          PY

      - name: Set up Python 3.14 for ABI3 smoke
        if: >-
          (runner.os == 'Linux' && inputs.target == 'x86_64') ||
          (runner.os == 'macOS' && runner.arch == 'X64' && inputs.target == 'x86_64') ||
          (runner.os == 'macOS' && runner.arch == 'ARM64' && inputs.target == 'aarch64')
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Test ABI3 wheel on Python 3.14
        if: >-
          (runner.os == 'Linux' && inputs.target == 'x86_64') ||
          (runner.os == 'macOS' && runner.arch == 'X64' && inputs.target == 'x86_64') ||
          (runner.os == 'macOS' && runner.arch == 'ARM64' && inputs.target == 'aarch64')
        run: |
          python -m venv abi3-wheel-test
          source abi3-wheel-test/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python - <<'PY'
          from agentbrowser import Browser
          import agentbrowser._native as native

          assert Browser
          assert native.__agent_browser_version__
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact }}
          path: dist/*
          if-no-files-found: error
